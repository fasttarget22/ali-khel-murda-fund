function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

// API helper
async function apiCall(action, data, method){
  if(API_URL.includes("PASTE_YOUR")) return null;
  try {
    if(method === "GET"){
      var r = await fetch(API_URL+"?action="+action, {redirect:"follow"});
      return await r.json();
    } else {
      var r = await fetch(API_URL, {
        method:"POST", redirect:"follow",
        headers:{"Content-Type":"text/plain"},
        body: JSON.stringify({action:action, ...data})
      });
      return await r.json();
    }
  } catch(e){ console.error("API Error:",e); return null; }
}

  // Load data from Google Sheets on startup
  var loadData = useCallback(async function(){
    // Try local storage first (instant load)
    try {
      var local = localStorage.getItem("akh-data");
      if(local){
        var d = JSON.parse(local);
        setMembers(d.members||[]); setEvents(d.events||[]); setPayments(d.payments||[]);
        setDefaultAmount(d.defaultAmount||20);
      }
    } catch(e){}
    setLoaded(true);
    // Then sync from Google Sheets
    if(isSetup){
      setSyncStatus("syncing");
      var result = await apiCall("getAll", null, "GET");
      if(result && !result.error){
        var m = result.members||[];
        var e = result.events||[];
        var p = result.payments||[];
        var amt = (result.settings && result.settings.defaultAmount) ? Number(result.settings.defaultAmount) : 20;
        setMembers(m); setEvents(e); setPayments(p); setDefaultAmount(amt);
        saveLocal(m,e,p,amt);
        setSyncStatus("synced"); setLastSync(new Date().toLocaleTimeString());
        setTimeout(function(){ setSyncStatus("idle"); }, 3000);
      } else {
        setSyncStatus("error");
      }
    }
    // Hide splash
    setTimeout(function(){ var s=document.getElementById("splash"); if(s) s.classList.add("hide"); }, 500);
  },[]);

  useEffect(function(){ loadData(); },[loadData]);

  function saveLocal(m,e,p,amt){
    try{ localStorage.setItem("akh-data", JSON.stringify({members:m,events:e,payments:p,defaultAmount:amt})); }catch(e){}
  }

  async function syncToCloud(m,e,p,amt){
    saveLocal(m,e,p,amt);
    if(!isSetup) return;
    setSyncStatus("syncing");
    var result = await apiCall("syncAll",{ members:m, events:e, payments:p, settings:{defaultAmount:amt} });
    if(result && result.success){
      setSyncStatus("synced"); setLastSync(new Date().toLocaleTimeString());
      setTimeout(function(){ setSyncStatus("idle"); }, 3000);
    } else { setSyncStatus("error"); }
  }

  var sectionMembers = members.filter(function(m){ return m.section===activeSection; });
  var filtered = sectionMembers.filter(function(m){
    if(!search) return true;
    var s = search.toLowerCase();
    return m.name.toLowerCase().includes(s)||m.sonOf.toLowerCase().includes(s)||m.location.toLowerCase().includes(s);
  });
  var sectionLeader = sectionMembers.find(function(m){ return m.isLeader; });

  function addOrUpdateMember(data){
    var nm;
    if(editingMember){ nm=members.map(function(m){ return m.id===editingMember.id?{...m,...data}:m; }); }
    else { nm=[...members,{id:uid(),sn:sectionMembers.length+1,section:activeSection,isLeader:false,...data}]; }
    setMembers(nm); syncToCloud(nm,events,payments,defaultAmount);
    setShowForm(false); setEditingMember(null);
  }
  function deleteMember(id){
    if(!confirm(t.confirmDelete)) return;
    var nm=members.filter(function(m){return m.id!==id;}); var np=payments.filter(function(p){return p.memberId!==id;});
    setMembers(nm); setPayments(np); syncToCloud(nm,events,np,defaultAmount);
  }
  function toggleLeader(id){
    var nm=members.map(function(m){ if(m.section===activeSection) return {...m,isLeader:m.id===id?!m.isLeader:false}; return m; });
    setMembers(nm); syncToCloud(nm,events,payments,defaultAmount);
  }
  function addDeathEvent(data){
    var evt={id:uid(),...data,date:data.date||new Date().toISOString().split("T")[0],amount:data.amount||defaultAmount};
    var ne=[...events,evt]; var np=[...payments];
    members.forEach(function(m){ np.push({id:uid(),memberId:m.id,eventId:evt.id,paid:false,approved:false,amount:evt.amount,paidDate:""}); });
    setEvents(ne); setPayments(np); syncToCloud(members,ne,np,defaultAmount); setShowEventForm(false);
  }
  function togglePayment(pid){
    var np=payments.map(function(p){ if(p.id===pid){var v=!p.paid; return{...p,paid:v,paidDate:v?new Date().toISOString().split("T")[0]:"",approved:v?p.approved:false};} return p; });
    setPayments(np); syncToCloud(members,events,np,defaultAmount);
  }
  function approvePayment(pid){
    var np=payments.map(function(p){return p.id===pid?{...p,approved:true}:p;});
    setPayments(np); syncToCloud(members,events,np,defaultAmount);
  }
  function markSectionAllPaid(eid,sid){
    var sIds=members.filter(function(m){return m.section===sid;}).map(function(m){return m.id;});
    var np=payments.map(function(p){ if(p.eventId===eid&&sIds.includes(p.memberId)&&!p.paid) return{...p,paid:true,paidDate:new Date().toISOString().split("T")[0]}; return p; });
    setPayments(np); syncToCloud(members,events,np,defaultAmount);
  }
  function getEventStats(eid){
    var ep=payments.filter(function(p){return p.eventId===eid;});
    var pc=ep.filter(function(p){return p.paid;}).length;
    return{total:ep.length,paidCount:pc,totalAmt:ep.reduce(function(s,p){return s+(p.paid?p.amount:0);},0),pendingAmt:ep.reduce(function(s,p){return s+(p.paid?0:p.amount);},0)};
  }
  function getSectionStats(sid){
    var sm=members.filter(function(m){return m.section===sid;});
    var ids=sm.map(function(m){return m.id;});
    var sp=payments.filter(function(p){return ids.includes(p.memberId);});
    var pa=sp.reduce(function(s,p){return s+(p.paid?p.amount:0);},0);
    var ta=sp.reduce(function(s,p){return s+Number(p.amount);},0);
    return{members:sm.length,paidAmt:pa,totalAmt:ta,pending:ta-pa};
  }
  function getMemberPaymentSummary(mid){
    var mp=payments.filter(function(p){return p.memberId===mid;});
    var pc=mp.filter(function(p){return p.paid;}).length;
    return{total:mp.length,paid:pc,unpaid:mp.length-pc};
  }

  function openWhatsApp(phone,msg){
    var num=(phone||"").replace(/[^0-9]/g,"");
    var url=num?"https://wa.me/"+num+"?text="+encodeURIComponent(msg):"https://wa.me/?text="+encodeURIComponent(msg);

  function buildAnnouncement(evt){
    var sec=SECTIONS.find(function(s){return s.id===evt.section;}); var sn=sec?(lang==="ur"?sec.ur:sec.en):"";
    return lang==="ur"
      ?"إنا لله وإنا إليه راجعون\n\nعلی خیل مردہ فنڈ — وفات کا اعلان\n\nمرحوم: "+evt.deceasedName+"\nسیکشن: "+sn+"\nتاریخ: "+evt.date+"\nچندہ: "+evt.amount+" AED فی ممبر\n\nبراہ کرم جلد ادا کریں۔ آمین"

  }
  function buildReminder(evt,name){
    return lang==="ur"

      :"Assalam-o-Alaikum "+name+"\n\nReminder: Ali Khel Murda Fund\nDeceased: "+evt.deceasedName+"\nContribution: "+evt.amount+" AED\n\nPlease pay soon. JazakAllah";
  }
  function buildLeaderMsg(evt,sid){
    var sec=SECTIONS.find(function(s){return s.id===sid;}); var sn=sec?(lang==="ur"?sec.ur:sec.en):"";
    var sm=members.filter(function(m){return m.section===sid;});

    return lang==="ur"

  // Image compression
  function compressImage(file,maxW,quality,cb){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var c=document.createElement("canvas");
        var ratio=Math.min(maxW/img.width,1);
        c.width=img.width*ratio; c.height=img.height*ratio;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        cb(c.toDataURL("image/jpeg",quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // Excel Import/Export
  function handleImportExcel(e){
    var file=e.target.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=new Uint8Array(ev.target.result);
        var wb=XLSX.read(data,{type:"array"});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:""});
        var newMembers=[...members];
        var count=0;
        var existingInSection=newMembers.filter(function(m){return m.section===activeSection;}).length;
        rows.forEach(function(row){
          var name=row["Name"]||row["name"]||row["نام"]||"";
          var sonOf=row["SonOf"]||row["S/o"]||row["sonOf"]||row["Son of"]||row["ولد"]||"";
          var location=row["Location"]||row["location"]||row["Dera"]||row["مقام"]||row["ڈیرہ"]||"";
          var phone=row["Phone"]||row["phone"]||row["فون"]||row["Mobile"]||"";
          var entryDate=row["EntryDate"]||row["Entry Date"]||row["Date"]||row["تاریخ"]||"";
          if(name.toString().trim()){
            existingInSection++;
            newMembers.push({id:uid(),sn:existingInSection,name:name.toString().trim(),sonOf:sonOf.toString().trim(),location:location.toString().trim(),phone:phone.toString().trim(),entryDate:entryDate.toString().trim(),section:activeSection,isLeader:false});
            count++;
          }
        });
        if(count>0){
          setMembers(newMembers);
          syncToCloud(newMembers,events,payments,defaultAmount);
          alert(count+t.importSuccess);
        }
      }catch(err){alert(t.importError+": "+err.message);}
    };
    reader.readAsArrayBuffer(file);
    e.target.value="";
  }

  function handleExportExcel(){

    });

  function handleExportAll(){
    var wb=XLSX.utils.book_new();
    SECTIONS.forEach(function(sec){
      var sm=members.filter(function(m){return m.section===sec.id;});
      var data=sm.map(function(m,i){
        var ps=getMemberPaymentSummary(m.id);

    var evtData=events.map(function(evt){
      var sec=SECTIONS.find(function(s){return s.id===evt.section;});

      return{"Deceased":evt.deceasedName,"Section":sec?sec.en:"","Date":evt.date,"Amount AED":evt.amount,"Paid":stats.paidCount,"Total":stats.total,"Collected AED":stats.totalAmt,"Pending AED":stats.pendingAmt};

    XLSX.writeFile(wb,"AliKhel_Murda_Fund_Complete.xlsx");
  }

                <div><span style={{color:"#94a3b8"}}>{t.relationship}:</span> {getHandover(evt.id).relationship}</div>
                <div><span style={{color:"#94a3b8"}}>{t.handoverDate}:</span> {getHandover(evt.id).handoverDate}</div>
                <div><span style={{color:"#94a3b8"}}>{t.handedBy}:</span> {getHandover(evt.id).handedBy}</div>
                <div><span style={{color:"#94a3b8"}}>{t.handoverAmount}:</span> <strong style={{color:"#4ade80"}}>{getHandover(evt.id).handoverAmount} AED</strong></div>
              </div>
              {getProofImage(evt.id)&&<div style={{marginTop:8}}><img src={getProofImage(evt.id)} style={{maxWidth:"100%",maxHeight:300,borderRadius:8,border:"1px solid rgba(255,255,255,0.1)"}} onClick={function(){window.open(getProofImage(evt.id),"_blank");}}/><div style={{fontSize:10,color:"#64748b",marginTop:4}}>📸 {t.viewProof}</div></div>}
            </div>
            :<HandoverForm evt={evt}/>}
          </div>}
        </div>);
      })}
    </div>);
  }

  function HandoverForm({evt}){
    var [rn,sRn]=useState(""); var [rel,sRel]=useState(""); var [hd,sHd]=useState(new Date().toISOString().split("T")[0]);
    var [hb,sHb]=useState(""); var [ha,sHa]=useState(getEventStats(evt.id).totalAmt); var [img,sImg]=useState(null);
    return(<div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{fontSize:12,color:"#94a3b8"}}>{t.notHandedYet}</div>
      <input style={S.inp} placeholder={t.recipientName} value={rn} onChange={function(e){sRn(e.target.value);}}/>
      <select style={{...S.inp,cursor:"pointer"}} value={rel} onChange={function(e){sRel(e.target.value);}}>
        <option value="">{t.relationship}</option>
        <option value={t.son}>{t.son}</option>
        <option value={t.widow}>{t.widow}</option>
        <option value={t.daughter}>{t.daughter}</option>
        <option value={t.brother}>{t.brother}</option>
        <option value={t.other}>{t.other}</option>
      </select>
      <input style={S.inp} placeholder={t.handedBy} value={hb} onChange={function(e){sHb(e.target.value);}}/>
      <input style={S.inp} type="date" value={hd} onChange={function(e){sHd(e.target.value);}}/>
      <div><label style={{fontSize:12,color:"#94a3b8"}}>{t.handoverAmount} (AED)</label>
      <input style={S.inp} type="number" value={ha} onChange={function(e){sHa(Number(e.target.value));}}/></div>
      <div>
        <label style={{fontSize:12,color:"#94a3b8",display:"block",marginBottom:4}}>📸 {t.uploadProof}</label>
        <input type="file" accept="image/*" style={{fontSize:12,color:"#94a3b8"}} onChange={function(e){
          var f=e.target.files[0]; if(!f) return;
          compressImage(f,500,0.6,function(dataUrl){sImg(dataUrl);});
        }}/>
        {img&&<img src={img} style={{maxWidth:120,maxHeight:80,borderRadius:6,marginTop:6,border:"1px solid rgba(255,255,255,0.1)"}}/>}
      </div>
      <button style={{...S.btn("primary"),marginTop:4}} onClick={function(e){
        e.stopPropagation();
        if(!rn.trim()||!rel){alert(lang==="ur"?"نام اور رشتہ ضروری ہے":"Name and relationship required"); return;}
        saveHandover(evt.id,{recipientName:rn.trim(),relationship:rel,handoverDate:hd,handedBy:hb.trim(),handoverAmount:ha,proofImage:img});
      }}>🤝 {t.saveHandover}</button>
    </div>);
  }

  function EventDetailModal(){
    if(!selectedEvent) return null;
    var evtP=payments.filter(function(p){return p.eventId===selectedEvent.id;});
    var secP={};SECTIONS.forEach(function(s){secP[s.id]=[];});
    evtP.forEach(function(p){var m=members.find(function(mm){return mm.id===p.memberId;});if(m&&secP[m.section])secP[m.section].push({...p,member:m});});
    return(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:200,overflowY:"auto",padding:12}}>
      <div style={{maxWidth:850,margin:"20px auto",background:"#0f2035",borderRadius:16,border:"1px solid rgba(74,222,128,0.15)",padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h3 style={{color:"#4ade80",margin:0,fontSize:18}}>{selectedEvent.deceasedName} — {selectedEvent.amount} AED</h3>
          <button style={S.btn()} onClick={function(){setSelectedEvent(null);}}>✕ {t.close}</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          <button style={S.wa} onClick={function(){openWhatsApp("",buildAnnouncement(selectedEvent));}}>📢 {t.sendToAll}</button>
        </div>
        {SECTIONS.map(function(sec){
          var sp=secP[sec.id];if(sp.length===0) return null;
          var secL=members.find(function(m){return m.section===sec.id&&m.isLeader;});
          var unpaid=sp.filter(function(p){return!p.paid;}); var paidC=sp.filter(function(p){return p.paid;});
          return(<div key={sec.id} style={{marginBottom:18,background:"rgba(255,255,255,0.02)",borderRadius:12,padding:12,border:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
              <div>
                <span style={{fontSize:15,fontWeight:700,color:"#fbbf24"}}>{lang==="ur"?sec.ur:sec.en}</span>
                {secL&&<span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>👑 {secL.name}</span>}
                <span style={{fontSize:11,color:"#64748b",marginLeft:8}}>({paidC.length}/{sp.length} {t.paid})</span>
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {unpaid.length>0&&<button style={{...S.btn("primary"),padding:"4px 10px",fontSize:11}} onClick={function(){markSectionAllPaid(selectedEvent.id,sec.id);}}>✓ {t.markAllPaid}</button>}
                {secL&&secL.phone&&<button style={{...S.wa,padding:"4px 10px",fontSize:11}} onClick={function(){openWhatsApp(secL.phone,buildLeaderMsg(selectedEvent,sec.id));}}>👑 {t.sendToLeader}</button>}
              </div>
            </div>
            <table style={S.tbl}><thead><tr>
              <th style={S.th}>{t.name}</th><th style={S.th}>{t.sonOf}</th><th style={S.th}>{t.paidAmount}</th>
              <th style={S.th}>{t.paymentDate}</th><th style={S.th}>{t.status}</th><th style={S.th}>{t.actions}</th>
            </tr></thead><tbody>
              {sp.map(function(p){return(
                <tr key={p.id} style={{background:p.paid?"rgba(74,222,128,0.03)":"rgba(239,68,68,0.03)"}}>
                  <td style={S.td}>{p.member.name}</td><td style={S.td}>{p.member.sonOf}</td>
                  <td style={S.td}>{p.paid?p.amount+" AED":"—"}</td><td style={S.td}>{p.paidDate||"—"}</td>
                  <td style={S.td}>{p.approved?<span style={S.bdg("approved")}>✓ {t.approved}</span>:p.paid?<span style={S.bdg("paid")}>{t.paid}</span>:<span style={S.bdg("unpaid")}>{t.unpaid}</span>}</td>
                  <td style={{...S.td,whiteSpace:"nowrap"}}>
                    <button style={{...S.btn(p.paid?"danger":"primary"),padding:"4px 10px",fontSize:11,marginRight:4}} onClick={function(){togglePayment(p.id);}}>{p.paid?t.markUnpaid:t.markPaid}</button>
                    {p.paid&&!p.approved&&<button style={{...S.btn(),padding:"4px 10px",fontSize:11,background:"rgba(59,130,246,0.2)",color:"#60a5fa",marginRight:4}} onClick={function(){approvePayment(p.id);}}>✓ {t.approve}</button>}
                    {!p.paid&&p.member.phone&&<button style={{...S.wa,padding:"4px 8px",fontSize:11}} onClick={function(){openWhatsApp(p.member.phone,buildReminder(selectedEvent,p.member.name));}}>📱</button>}
                  </td>
                </tr>);})}
            </tbody></table>
          </div>);
        })}
      </div>
    </div>);
  }

  function SummaryTab(){
    var tm=members.length; var tp=payments.filter(function(p){return p.paid;}).reduce(function(s,p){return s+Number(p.amount);},0);
    var tpd=payments.filter(function(p){return!p.paid;}).reduce(function(s,p){return s+Number(p.amount);},0);
    return(<div>
      <div style={{...S.card,display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
        <div style={{textAlign:"center",padding:10}}><div style={{fontSize:24,fontWeight:800,color:"#4ade80"}}>{tm}</div><div style={{fontSize:11,color:"#64748b"}}>{t.allMembers}</div></div>
        <div style={{textAlign:"center",padding:10}}><div style={{fontSize:24,fontWeight:800,color:"#60a5fa"}}>{events.length}</div><div style={{fontSize:11,color:"#64748b"}}>{t.totalEvents}</div></div>
        <div style={{textAlign:"center",padding:10}}><div style={{fontSize:24,fontWeight:800,color:"#4ade80"}}>{tp}<span style={{fontSize:12}}> AED</span></div><div style={{fontSize:11,color:"#64748b"}}>{t.collected}</div></div>
        <div style={{textAlign:"center",padding:10}}><div style={{fontSize:24,fontWeight:800,color:"#f87171"}}>{tpd}<span style={{fontSize:12}}> AED</span></div><div style={{fontSize:11,color:"#64748b"}}>{t.pending}</div></div>
      </div>
      {SECTIONS.map(function(sec){var st=getSectionStats(sec.id);var ld=members.find(function(m){return m.section===sec.id&&m.isLeader;});
        return(<div key={sec.id} style={{...S.card,padding:"12px 14px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:15,fontWeight:700,color:"#e2e8f0"}}>{lang==="ur"?sec.ur:sec.en}</div><div style={{fontSize:11,color:"#64748b"}}>{st.members} {t.members} {ld?"• 👑 "+ld.name:""}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:700,color:"#4ade80"}}>{st.paidAmt} AED</div>{st.pending>0&&<div style={{fontSize:11,color:"#f87171"}}>{st.pending} AED {t.pending}</div>}</div>
        </div></div>);})}
    </div>);
  }

  function SettingsTab(){
    var [am,sAm]=useState(defaultAmount);
    return(<div><div style={S.card}>
      <h3 style={{color:"#4ade80",margin:"0 0 14px",fontSize:16}}>{t.settings}</h3>
      <label style={{fontSize:13,color:"#94a3b8",display:"block",marginBottom:6}}>{t.contributionAmount}</label>
      <input style={{...S.inp,maxWidth:200}} type="number" value={am} onChange={function(e){sAm(Number(e.target.value));}}/>
      <div style={{marginTop:12}}><button style={S.btn("primary")} onClick={function(){setDefaultAmount(am);syncToCloud(members,events,payments,am);}}>{t.saveSettings}</button></div>
      <div style={{marginTop:20,padding:12,background:"rgba(255,255,255,0.03)",borderRadius:8,fontSize:12,color:"#64748b"}}>
        <div>👥 {t.allMembers}: {members.length}</div>
        <div>📋 {t.deathEvents}: {events.length}</div>
        <div>💰 {t.contribution}: {defaultAmount} AED {t.perMember}</div>
        <div style={{marginTop:8,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:8}}>
          <div>☁️ Google Sheets: {isSetup?<span style={{color:"#4ade80"}}>Connected</span>:<span style={{color:"#f87171"}}>Not Set Up</span>}</div>
          {lastSync&&<div>🔄 {t.lastSync}: {lastSync}</div>}
          {syncStatus==="error"&&<button style={{...S.btn("primary"),padding:"4px 12px",fontSize:11,marginTop:6}} onClick={function(){syncToCloud(members,events,payments,defaultAmount);}}>{t.retry}</button>}
        </div>
        <div style={{marginTop:10,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:10}}>
          <button style={{...S.btn(),padding:"8px 16px",fontSize:12,background:"rgba(74,222,128,0.1)",color:"#4ade80"}} onClick={handleExportAll}>📤 {lang==="ur"?"تمام ڈیٹا ایکسل میں برآمد":"Export All Data to Excel"}</button>
        </div>
      </div>
    </div></div>);
  }

  if(!loaded) return null;

  return(<div style={S.app}>
    <div style={{position:"relative"}}>
      <div style={S.header}>
        <h1 style={{fontSize:26,fontWeight:800,color:"#4ade80",margin:0}}>{t.title}</h1>
        <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{t.subtitle}</div>
      </div>
      <button style={S.langBtn} onClick={function(){setLang(lang==="en"?"ur":"en");}}>{t.language}</button>
    </div>
    {!isSetup&&<div style={{textAlign:"center",padding:"8px",fontSize:12,background:"rgba(239,68,68,0.1)",color:"#f87171",borderRadius:8,margin:"8px 0"}}>{t.setupNeeded}</div>}
    <div style={S.syncBar}>{syncStatus==="syncing"?"⏳ "+t.syncing:syncStatus==="synced"?"✅ "+t.synced:syncStatus==="error"?"❌ "+t.syncError:""}</div>
    <div style={S.sTabs}>
      {SECTIONS.map(function(s){var c=members.filter(function(m){return m.section===s.id;}).length;
        return <div key={s.id} style={S.sT(activeSection===s.id)} onClick={function(){setActiveSection(s.id);}}>{lang==="ur"?s.ur:s.en} ({c})</div>;})}
    </div>
    <div style={{padding:"4px 0 20px"}}>
      {tab==="members"&&<MembersTab/>}{tab==="events"&&<EventsTab/>}{tab==="summary"&&<SummaryTab/>}{tab==="settings"&&<SettingsTab/>}
    </div>
    {selectedEvent&&<EventDetailModal/>}
    <div style={S.nav}>
      <div style={S.nI(tab==="members")} onClick={function(){setTab("members");}}><div style={{fontSize:18}}>👥</div>{t.members}</div>
      <div style={S.nI(tab==="events")} onClick={function(){setTab("events");}}><div style={{fontSize:18}}>📋</div>{t.deathEvents}</div>
      <div style={S.nI(tab==="summary")} onClick={function(){setTab("summary");}}><div style={{fontSize:18}}>📊</div>{t.summary}</div>
      <div style={S.nI(tab==="settings")} onClick={function(){setTab("settings");}}><div style={{fontSize:18}}>⚙️</div>{t.settings}</div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
